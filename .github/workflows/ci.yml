name: AppDrop CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-engine:
    name: ✅ Python Engine Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install fastapi uvicorn pydantic pytest pytest-asyncio httpx websockets
      - name: Run all tests
        run: pytest tests/ -v --tb=short

  test-frontend:
    name: ✅ Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install deps
        run: npm install
      - name: Run tests
        run: npm test
      - name: Build check
        run: npm run build
