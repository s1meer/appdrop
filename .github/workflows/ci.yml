name: AppDrop CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-engine:
    name: ✅ Python Engine Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with: { python-version: "3.11" }
      - run: pip install fastapi uvicorn pydantic pytest pytest-asyncio httpx websockets
      - run: pytest tests/ -v --tb=short

  test-frontend:
    name: ✅ Frontend Tests + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm install
      - run: npm test
      - run: npm run build

  build-desktop:
    name: 🖥 Desktop Build (macOS)
    runs-on: macos-latest
    needs: [test-engine, test-frontend]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: aarch64-apple-darwin,x86_64-apple-darwin }
      - run: npm install
      - run: npm install -g @tauri-apps/cli
      - run: npm run tauri build -- --target universal-apple-darwin
      - uses: actions/upload-artifact@v4
        with:
          name: AppDrop-macOS
          path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg

  build-windows:
    name: 🪟 Desktop Build (Windows)
    runs-on: windows-latest
    needs: [test-engine, test-frontend]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: dtolnay/rust-toolchain@stable
      - run: npm install
      - run: npm install -g @tauri-apps/cli
      - run: npm run tauri build
      - uses: actions/upload-artifact@v4
        with:
          name: AppDrop-Windows
          path: src-tauri/target/release/bundle/msi/*.msi

  release:
    name: 🚀 GitHub Release
    runs-on: ubuntu-latest
    needs: [build-desktop, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v1
        with:
          files: |
            AppDrop-macOS/*.dmg
            AppDrop-Windows/*.msi
          generate_release_notes: true
