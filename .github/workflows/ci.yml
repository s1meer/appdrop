name: AppDrop CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test-engine:
    name: ✅ Python Engine Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with: { python-version: "3.11" }
      - run: pip install fastapi uvicorn pydantic pytest pytest-asyncio httpx websockets
      - run: pytest tests/ -v --tb=short

  test-frontend:
    name: ✅ Frontend Tests + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm install
      - run: npm test
      - run: npm run build

  build-and-release:
    name: 📦 Build & Release
    needs: [test-engine, test-frontend]
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            args: --target universal-apple-darwin
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
          - os: windows-latest
            args: ''
            rust-targets: ''
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}
      - run: npm install

      # Windows only: generate self-signed cert, export as base64 PFX
      - name: Generate Windows self-signed certificate
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $cert = New-SelfSignedCertificate -Type Custom -Subject "CN=AppDrop, O=AppDrop" `
            -KeyUsage DigitalSignature -FriendlyName "AppDrop" `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3","2.5.29.19={text}")
          $pwd = ConvertTo-SecureString -String "appdrop-ci" -Force -AsPlainText
          Export-PfxCertificate -Cert "Cert:\CurrentUser\My\$($cert.Thumbprint)" `
            -FilePath certificate.pfx -Password $pwd
          $b64 = [Convert]::ToBase64String([IO.File]::ReadAllBytes("certificate.pfx"))
          echo "WINDOWS_CERTIFICATE=$b64" >> $env:GITHUB_ENV
          echo "WINDOWS_CERTIFICATE_PASSWORD=appdrop-ci" >> $env:GITHUB_ENV

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Windows — set by step above
          WINDOWS_CERTIFICATE: ${{ env.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ env.WINDOWS_CERTIFICATE_PASSWORD }}
          # Skip updater signing, binary stripping, and dev-server check
          TAURI_PRIVATE_KEY: ''
          NO_STRIP: 1
          TAURI_SKIP_DEVSERVER_CHECK: true
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'AppDrop ${{ github.ref_name }}'
          releaseBody: 'Download the DMG (macOS) or MSI (Windows) below.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
